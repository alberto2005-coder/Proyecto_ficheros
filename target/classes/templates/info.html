<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Información de Ficheros</title>
    <link rel="stylesheet" th:href="@{/css/info.css}">

</head>
<body>
    <h1>Contenido del Directorio</h1>

    <p th:if="${mensajeError}" style="color: red;" th:text="${mensajeError}"></p>
    <p th:if="${mensajeExito}" style="color: green;" th:text="${mensajeExito}"></p>

    <p><a th:href="@{/}">← Volver al Formulario de Consulta</a></p>

    <div th:if="${elementos}">
        <h2>Ruta Actual: <span th:text="${rutaActual}"></span></h2>

        <form th:action="@{/crearArchivo}" method="post" style="margin-bottom: 20px;">
            <input type="hidden" name="ruta" th:value="${rutaActual}" />
            <label for="nombreArchivo">Nuevo archivo texto plano:</label>
            <input type="text" id="nombreArchivo" name="nombreArchivo" placeholder="ejemplo.txt" required>
            <button type="submit" style="background-color: green; color: white; border: none; padding: 5px 10px;">➕ Crear</button>
        </form>
        
        <form th:action="@{/crearRandomAccessFile}" method="post" style="margin-bottom: 30px;">
            <input type="hidden" name="ruta" th:value="${rutaActual}" />
            <label for="nombreArchivoRA">Nuevo archivo Acceso Aleatorio:</label>
            <input type="text" id="nombreArchivoRA" name="nombreArchivo" placeholder="ejemplo_binario.dat" required>
            <button type="submit" style="background-color: darkred; color: white; border: none; padding: 5px 10px;">💾 Crear RA</button>
        </form> 

        <h3 style="margin-top: 40px; border-top: 1px solid #ccc; padding-top: 15px;">Conversión de Fichero</h3>
        <form th:action="@{/convertir}" method="post" style="margin-bottom: 30px;">
            <input type="hidden" name="rutaDirectorioPadre" th:value="${rutaActual}" />
            
            <label for="inputPath">Ruta Fichero ENTRADA:</label>
            <input type="text" id="inputPath" name="inputPath" placeholder="/ruta/entrada.txt" required size="40">
            
            <label for="inputEncoding">Encoding Entrada:</label>
            <select id="inputEncoding" name="inputEncoding" required>
                <option value="UTF-8">UTF-8</option>
                <option value="ASCII">ASCII</option>
                <option value="UTF-16">UTF-16</option>
                <option value="ISO-8859-1">ISO-8859-1</option>
            </select>
            
            <br><br>
            
            <label for="outputPath">Ruta Fichero SALIDA:</label>
            <input type="text" id="outputPath" name="outputPath" placeholder="/ruta/salida.txt" required size="40">
            
            <label for="outputEncoding">Encoding Salida:</label>
            <select id="outputEncoding" name="outputEncoding" required>
                <option value="UTF-8">UTF-8</option>
                <option value="ASCII">ASCII</option>
                <option value="UTF-16">UTF-16</option>
                <option value="ISO-8859-1">ISO-8859-1</option>
            </select>

            <button type="submit" style="background-color: orange; color: white; border: none; padding: 5px 10px; margin-left: 20px;">🔄 Convertir Fichero</button>
        </form> 
        <div th:if="${rutaActual != rutaPadre}">
            <form th:action="@{/info}" method="post" style="display: inline;">
                <input type="hidden" name="ruta" th:value="${rutaPadre}" />
                <button type="submit" style="color: green; border: 1px solid green;">[..] Subir Directorio</button>
            </form>
        </div>

        <ul class="file-list">
            <li th:each="item : ${elementos}">
                <div class="file-name">
                    <span th:if="${item.directory}" style="color: darkblue;">[DIR]</span>
                    <span th:unless="${item.directory}" style="color: black;">[FILE]</span>

                    <span th:if="${item.directory}">
                        <form th:action="@{/info}" method="post" style="display: inline;">
                            <input type="hidden" name="ruta" th:value="${item.absolutePath}" />
                            <button type="submit" style="background: none; border: none; cursor: pointer; text-decoration: underline; color: darkblue;">
                                <span th:text="${item.name}">nombre_archivo</span>
                            </button>
                        </form>
                    </span>
                    <span th:unless="${item.directory}" th:text="${item.name}">nombre_archivo</span>
                </div>

                <span th:unless="${item.directory}">
                    <form th:action="@{/editar}" method="get" style="display: inline; margin-left: 10px;">
                        <input type="hidden" name="rutaCompleta" th:value="${item.absolutePath}" />
                        <button type="submit"
                                style="color: black; background-color: yellow; border: none; padding: 5px 10px; cursor: pointer;">
                            ✏️ Editar
                        </button>
                    </form>
                </span>
                
                <span th:unless="${item.directory}">
                    <form th:action="@{/editarAleatorio}" method="post" style="display: inline; margin-left: 10px;">
                        <input type="hidden" name="rutaCompleta" th:value="${item.absolutePath}" />
                        <input type="number" name="posicion" placeholder="Posición (bytes)" required size="15" min="0" style="width: 120px;">
                        <input type="text" name="contenido" placeholder="Datos a insertar (texto)" required size="20" style="width: 150px;">
                        <button type="submit"
                                style="color: white; background-color: purple; border: none; padding: 5px 10px; cursor: pointer;">
                            🖋️ Escribir Aleatorio
                        </button>
                    </form>
                </span>

                <form th:action="@{/eliminar}" method="post" style="display: inline; margin-left: 10px;">
                    <input type="hidden" name="rutaCompleta" th:value="${item.absolutePath}" />
                    <button type="submit"
                            onclick="return confirm('¿Estás seguro de eliminar ' + event.target.form.elements['rutaCompleta'].value + '?');"
                            style="color: white; background-color: red; border: none; padding: 5px 10px; cursor: pointer;">
                        ❌ Eliminar
                    </button>
                </form>
            </li>
        </ul>
    </div>
</body>
</html>

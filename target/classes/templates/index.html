<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Explorador de Ficheros - Inicio</title>
</head>
<body>
    <h1>Explorar Fichero/Directorio</h1>

    <div th:if="${mensaje}">
        <p th:utext="${mensaje}" style="color: blue; font-weight: bold; border: 1px solid #ccc; padding: 10px;"></p>
    </div>

    <form action="/info" method="post">
        <label for="ruta">Ruta:</label>
        <input type="text" id="ruta" name="ruta" size="50" required>
        <button type="submit">Consultar</button>
    </form>
    
    <hr>
    
    <form action="/crearEstructura" method="post" style="margin-top: 15px;">
        <button type="submit">Crear Estructura de Ejemplo</button>
    </form>
</body>
</html>
